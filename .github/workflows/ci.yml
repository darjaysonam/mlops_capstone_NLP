name: CI/CD Pipeline

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build-test-deploy:

    runs-on: ubuntu-latest

    env:
      APP_ENV: ci
      PYTHONUNBUFFERED: 1

    steps:

    - name: Checkout Code
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'
        cache: 'pip'

    - name: Install Dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
        pip install flake8 black pytest pytest-cov

    - name: Run Flake8
      run: flake8 .

    - name: Check Formatting (Black)
      run: black --check .

    - name: Run Pytest with Coverage
      run: |
        pytest --cov=src --cov-report=term --cov-report=xml

    - name: Log in to Docker Hub
      uses: docker/login-action@v3
      with:
        username: ${{ secrets.DOCKER_USERNAME }}
        password: ${{ secrets.DOCKER_PASSWORD }}

    - name: Build Docker Image
      run: |
        docker build \
          -f docker/Dockerfile.serving \
          --build-arg APP_ENV=ci \
          -t darjaysonam/fastapi-app:${{ github.sha }} \
          -t darjaysonam/fastapi-app:latest \
          .

    - name: Push Docker Image
      run: |
        docker push darjaysonam/fastapi-app:${{ github.sha }}
        docker push darjaysonam/fastapi-app:latest

    - name: Deployment Notification
      run: echo "CI/CD pipeline completed successfully!"