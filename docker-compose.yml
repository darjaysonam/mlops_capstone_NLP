version: "3.9"

services:

  # -----------------------------------------
  # PostgreSQL (MLflow Backend Store)
  # -----------------------------------------
  postgres:
    image: postgres:15
    container_name: mlflow_postgres
    restart: unless-stopped
    env_file:
      - .env
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - ml_network


  # -----------------------------------------
  # MLflow Tracking Server
  # -----------------------------------------
  mlflow:
    image: ghcr.io/mlflow/mlflow:latest
    container_name: mlflow_server
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    env_file:
      - .env
    ports:
      - "${MLFLOW_PORT}:5000"
    command: >
      mlflow server
      --backend-store-uri postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB}
      --default-artifact-root /mlflow/artifacts
      --host 0.0.0.0
    volumes:
      - mlflow_artifacts:/mlflow/artifacts
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:5000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
    networks:
      - ml_network


  # -----------------------------------------
  # FastAPI Inference Service
  # -----------------------------------------
  fastapi:
    build:
      context: .
      dockerfile: docker/Dockerfile.serving
    container_name: fastapi_api
    restart: unless-stopped
    env_file:
      - .env
    environment:
      APP_ENV: docker
      MODEL_PATH: /app/models/best_multilabel_nlp.pth
    ports:
      - "${FASTAPI_PORT}:8000"
    depends_on:
      mlflow:
        condition: service_healthy
    volumes:
      - ./models:/app/models   # 🔥 Mount model externally (not inside image)
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/docs"]
      interval: 30s
      timeout: 10s
      retries: 3
    networks:
      - ml_network


# -----------------------------------------
# Volumes
# -----------------------------------------
volumes:
  postgres_data:
  mlflow_artifacts:


# -----------------------------------------
# Custom Network
# -----------------------------------------
networks:
  ml_network:
    driver: bridge